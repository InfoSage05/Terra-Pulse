name: CI

on: [push, pull_request]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: terrapulse
          POSTGRES_PASSWORD: password
          POSTGRES_DB: terrapulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8

    - name: Run Migrations
      env:
        DATABASE_URL: postgresql://terrapulse:password@localhost:5432/terrapulse
      run: |
        # The project uses its own idempotent runner (storage/scripts/run_migrations.py,
        # also invoked on every backend/scheduler container start - see
        # backend/Dockerfile), not alembic - there is no alembic config in this repo.
        python storage/scripts/run_migrations.py
        python storage/seeds/seed_areas.py

    - name: Lint Python (flake8)
      run: |
        flake8 ingestion agents_layer backend models_layer shared storage --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run Python Tests
      env:
        DATABASE_URL: postgresql://terrapulse:password@localhost:5432/terrapulse
        REDIS_URL: redis://localhost:6379/0
      run: |
        pytest backend/tests/ shared/tests/ models_layer/registry/tests/

    - name: Set up Node
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Run Frontend Tests
      working-directory: ./frontend
      run: npx vitest run

    - name: Lint Frontend
      working-directory: ./frontend
      run: npm run lint --if-present
